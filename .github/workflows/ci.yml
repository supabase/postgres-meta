name: CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

# Cancel old builds on new commit for same workflow + branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      - run: |
          npm clean-install
          npm run check
          npm run test

      - uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: coverage/lcov.info

  prettier-check:
    name: Prettier check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'

      # Installing all dependencies takes up to three minutes, hacking around to only installing prettier+deps
      - name: Download dependencies
        run: |
          rm package.json
          rm package-lock.json
          npm i prettier@3 prettier-plugin-sql@0.17.0
      - name: Run prettier
        run: |-
          npx prettier -c '{src,test}/**/*.ts'

  docker:
    name: Build with docker
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        name: Checkout Repo

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        name: Set up Docker Buildx
      
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          push: false
          tags: pg-meta:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Check Health status
        run: |
          docker run -d --name pg-meta-test pg-meta:test
          state=$(docker inspect -f '{{ .State.Health.Status}}' pg-meta-test)
          if [ $state != "starting" ]; then
            exit 1
          fi
          sleep 10
          state=$(docker inspect -f '{{ .State.Health.Status}}' pg-meta-test)
          docker stop pg-meta-test
          if [ $state == "healthy" ]; then
            exit 0
          else
            exit 1
          fi
      
      

